server:
  port: 8081

spring:
  application:
    name: vms-service-user
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/vms_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: vms-secret-key-must-be-at-least-256-bits-long-for-security
  expiration: 86400000

# 文件上传配置
file:
  upload:
    path: ${user.dir}/vms-upload/avatar/
  access:
    url-prefix: /uploads/avatar/

logging:
  level:
    com.vms: debug